<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENE Live2D Viewer</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <canvas id="live2d-canvas"></canvas>

    <!-- 채팅 UI -->
    <div id="chat-container">
        <div id="chat-messages"></div>

        <!-- 로딩 인디케이터 -->
        <div id="loading-indicator" style="display: none;">
            <span class="typing-dot"></span>
            <span class="typing-dot"></span>
            <span class="typing-dot"></span>
            <span class="typing-text">생각중...</span>
        </div>

        <!-- 이미지 미리보기 영역 -->
        <div id="image-preview-container"></div>

        <div id="chat-input-wrapper">
            <!-- 이미지 첨부 버튼 -->
            <button id="attach-button" title="이미지 첨부">📎</button>
            <input type="file" id="image-input" accept="image/*" multiple hidden>

            <input type="text" id="chat-input" placeholder="메시지를 입력하세요...">
            <button id="send-button">전송</button>
        </div>
    </div>

    <!-- 로컬 JavaScript 라이브러리 사용 -->
    <script src="lib/pixi.min.js"></script>
    <script src="lib/live2dcubismcore.min.js"></script>
    <script src="lib/pixi-live2d-display.min.js"></script>

    <!-- QWebChannel -->
    <script src="qrc:///qtwebchannel/qwebchannel.js"></script>

    <!-- 메인 스크립트 -->
    <script src="script.js"></script>
</body>

</html>
