<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENE Live2D Viewer</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <canvas id="live2d-canvas"></canvas>
    <div id="token-usage-bubble" class="hidden" aria-live="polite"></div>

    <!-- 채팅 UI -->
    <div id="chat-container">
        <div id="chat-messages"></div>

        <!-- 로딩 인디케이터 -->
        <div id="loading-indicator" class="message assistant" style="display: none;" aria-live="polite">
            <span class="typing-dot"></span>
            <span class="typing-dot"></span>
            <span class="typing-dot"></span>
            <span class="typing-text">생각중...</span>
        </div>

        <!-- 이미지 미리보기 영역 -->
        <div id="image-preview-container"></div>

        <div id="chat-input-wrapper">
            <!-- 첨부 버튼 -->
            <button id="attach-button" type="button" title="파일 첨부" aria-label="파일 첨부">
                <svg class="lucide-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="m16 6-8.414 8.586a2 2 0 0 0 2.829 2.829l8.414-8.586a4 4 0 1 0-5.657-5.657l-8.379 8.551a6 6 0 1 0 8.485 8.485l8.379-8.551" />
                </svg>
            </button>
            <input type="file" id="image-input" accept="image/*,.txt,.md,.pdf,.docx" multiple hidden>

            <textarea id="chat-input" placeholder="메시지를 입력하세요..." rows="1"></textarea>
            <button id="send-button">전송</button>
        </div>
    </div>

    <div id="floating-action-buttons">
        <button id="manual-summarize-floating-btn" title="대화 요약">요약</button>
        <button id="obs-note-floating-btn" title="Obsidian 노트 패널 열기/닫기">노트</button>
        <button id="mood-toggle-floating-btn" title="기분 상태">기분</button>
    </div>
    <div id="mood-status-widget" class="hidden" aria-live="polite">
        <div id="mood-status-header">
            <div id="mood-status-label">기분: 로딩 중</div>
            <button id="mood-status-collapse-btn" type="button" title="접기">_</button>
        </div>
        <div id="mood-status-meters">
            <div class="mood-meter-row">
                <span id="mood-meter-name-valence" class="mood-meter-name">긍정</span>
                <div class="mood-meter-track"><div id="mood-meter-valence" class="mood-meter-fill mood-meter-fill-valence"></div></div>
            </div>
            <div class="mood-meter-row">
                <span id="mood-meter-name-bond" class="mood-meter-name">친밀</span>
                <div class="mood-meter-track"><div id="mood-meter-bond" class="mood-meter-fill"></div></div>
            </div>
            <div class="mood-meter-row">
                <span id="mood-meter-name-energy" class="mood-meter-name">활력</span>
                <div class="mood-meter-track"><div id="mood-meter-energy" class="mood-meter-fill"></div></div>
            </div>
            <div class="mood-meter-row">
                <span id="mood-meter-name-stress" class="mood-meter-name">긴장</span>
                <div class="mood-meter-track"><div id="mood-meter-stress" class="mood-meter-fill mood-meter-fill-stress"></div></div>
            </div>
        </div>
    </div>

    <div id="summary-confirm-overlay" class="hidden" role="dialog" aria-modal="true" aria-labelledby="summary-confirm-title">
        <div id="summary-confirm-dialog">
            <div id="summary-confirm-title">수동 요약</div>
            <div id="summary-confirm-body">수동 요약을 진행하시겠습니까?</div>
            <div id="summary-confirm-actions">
                <button id="summary-confirm-no" type="button">아니오</button>
                <button id="summary-confirm-yes" type="button">예</button>
            </div>
        </div>
    </div>

    <div id="toast-container" aria-live="polite" aria-atomic="true"></div>

    <!-- 로컬 JavaScript 라이브러리 사용 -->
    <script src="lib/pixi.min.js"></script>
    <script src="lib/live2dcubismcore.min.js"></script>
    <script src="lib/pixi-live2d-display.min.js"></script>

    <!-- QWebChannel -->
    <script src="qrc:///qtwebchannel/qwebchannel.js"></script>

    <!-- 메인 스크립트 -->
    <script src="script.js"></script>
</body>

</html>
