name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  lint-and-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11"]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Install Linux Qt runtime dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1

      - name: Ruff (basic)
        run: ruff check . --select E9,F63,F7,F82

      - name: Run tests with coverage (Linux)
        if: runner.os == 'Linux'
        env:
          # GitHub Ubuntu 러너는 headless 환경이라 Qt 위젯 테스트에 offscreen 플랫폼이 필요하다.
          QT_QPA_PLATFORM: offscreen
        run: python -m pytest -q --cov=src --cov-report=term-missing --cov-fail-under=4

      - name: Run tests with coverage (Windows)
        if: runner.os == 'Windows'
        env:
          # GitHub Windows 러너도 대화형 데스크톱이 없어 Qt UI 테스트가 즉시 실패할 수 있다.
          QT_QPA_PLATFORM: offscreen
        run: python -m pytest -q --cov=src --cov-report=term-missing --cov-fail-under=4
